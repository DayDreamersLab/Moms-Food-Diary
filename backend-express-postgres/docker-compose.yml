services:
  postgres:
    image: postgres:16
    container_name: moms-food-diary-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: moms_food_diary
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: change-this-admin-password
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    command:
      - postgres
      - -c
      - password_encryption=scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d moms_food_diary"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
